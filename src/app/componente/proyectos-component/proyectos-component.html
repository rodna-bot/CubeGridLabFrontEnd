<div class="Proyectos_Componentes">
  <h2>Listado de Proyectos</h2>
</div>
<div class="container-proyectos-componente">

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

      <!-- Código Column -->
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef> No. </th>
        <td mat-cell *matCellDef="let element"> {{element.codigo}} </td>
      </ng-container>

      <!-- Username Column -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre del proyecto </th>
        <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      </ng-container>

      <!-- Password Column -->
      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Descripción </th>
        <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      </ng-container>

      <!-- Password Column -->
      <ng-container matColumnDef="fecha-creacion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Fecha de creacion </th>
        <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      </ng-container>

      <!-- Password Column -->
      <ng-container matColumnDef="codigo-usuario">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Codigo de usuario </th>
        <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      </ng-container>

      <!-- Password Column -->
      <ng-container matColumnDef="codigo-curso">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Codigo de curso </th>
        <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      </ng-container>

      <!-- Password Column -->
      <ng-container matColumnDef="codigo-nanosatelite">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Codigo de nanosatelite </th>
        <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      </ng-container>


      <!-- Acción: Editar -->
      <ng-container matColumnDef="accion1">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let element">
          <button mat-raised-button [routerLink]="['/editar-proyecto', element.codigo]">
            <span class="material-icons">edit</span>
          </button>
          <button mat-raised-button (click)="eliminarProyecto(element.codigo)">
            <span class="material-icons">delete</span>
          </button>
        </td>
      </ng-container>

      <!-- Header y Filas -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <!-- Contenedor flex para paginador y botón -->
    <div class="paginator-container" style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
      <!-- Botón agregar curso alineado a la izquierda -->
      <button mat-raised-button color="primary" [routerLink]="'/registrar-proyectos'">
        <span class="material-icons">book</span> Registrar proyectos
      </button>


      <!-- Paginador alineado a la derecha -->
      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        showFirstLastButtons
        aria-label="Select page of periodic elements">
      </mat-paginator>
    </div>
  </div>
</div>
